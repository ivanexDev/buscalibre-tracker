openapi: 3.0.0
info:
  title: Buscalibre Price Tracker (LibroBaratito) API
  description: |
    REST API for the Buscalibre Price Tracker platform, designed for monitoring book prices on Buscalibre.com and notifying users of price drops.
    
    This API follows Domain-Driven Design principles and implements a layered architecture.
    
    ## Features
    - Book management (scraping from Buscalibre URL)
    - Price history tracking
    - User-defined price alerts
    - Email notifications via Resend
    
  version: 0.1.0
  contact:
    name: LibroBaratito Development Team
  license:
    name: MIT
    
servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.librobaratito.com/api
    description: Production server

paths:
  /auth/register:
    post:
      summary: Register a new user
      description: Create a new user account with email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                name:
                  type: string
              required:
                - email
                - password
                - name
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Invalid input or user already exists

  /auth/login:
    post:
      summary: Login
      description: Authenticate user and receive a session
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      summary: Logout
      description: Terminate the current user session
      tags:
        - Authentication
      responses:
        '200':
          description: Logout successful

  /books:
    get:
      summary: Get user's books
      description: Retrieve a list of all books tracked by the authenticated user with current prices
      tags:
        - Books
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved user's books
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      books:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserBook'
                      count:
                        type: integer
        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    post:
      summary: Add a new book
      description: Add a new book by providing its Buscalibre URL. The system will scrape the book details automatically.
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  example: https://www.buscalibre.com/libro-un-mundo-feliz/9788497592208/p/1324103
              required:
                - url
      responses:
        '201':
          description: Book added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: Invalid URL or book already exists
        '500':
          description: Internal server error

  /books/{id}:
    get:
      summary: Get book by ID
      description: Retrieve detailed information about a specific book including current price and price history
      tags:
        - Books
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Book ID
      responses:
        '200':
          description: Successfully retrieved book
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      book:
                        $ref: '#/components/schemas/UserBookDetails'
        '400':
          description: Invalid book ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found or not owned by user
    
    delete:
      summary: Delete book
      description: Stop tracking a book and remove it from the system
      tags:
        - Books
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Book ID
      responses:
        '204':
          description: Book deleted successfully
        '404':
          description: Book not found

  /books/{id}/prices:
    get:
      summary: Get price history
      description: Retrieve the full price history for a specific book
      tags:
        - Books
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Book ID
      responses:
        '200':
          description: Successfully retrieved price history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PriceHistory'

  /alerts:
    get:
      summary: Get user alerts
      description: Retrieve all price alerts for the authenticated user
      tags:
        - Alerts
      responses:
        '200':
          description: Successfully retrieved alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
    
    post:
      summary: Create a price alert
      description: Create a new price alert for a book
      tags:
        - Alerts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertRequest'
      responses:
        '201':
          description: Alert created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'

  /alerts/{id}:
    patch:
      summary: Update alert
      description: Update alert threshold or status
      tags:
        - Alerts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                alert_threshold:
                  type: number
                alert_enabled:
                  type: boolean
      responses:
        '200':
          description: Alert updated successfully
    
    delete:
      summary: Delete alert
      description: Remove a price alert
      tags:
        - Alerts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Alert deleted successfully

  /notifications:
    get:
      summary: Get notifications
      description: Retrieve notification history for the authenticated user
      tags:
        - Notifications
      responses:
        '200':
          description: Successfully retrieved notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

components:
  schemas:
    UserBook:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Book ID
        title:
          type: string
        author:
          type: string
        imageUrl:
          type: string
          description: URL to book cover image
        currentPrice:
          type: number
          nullable: true
          description: Current price in CLP
        lowestPrice:
          type: number
          nullable: true
          description: Lowest historical price
        highestPrice:
          type: number
          nullable: true
          description: Highest historical price
        alertEnabled:
          type: boolean
        alertThreshold:
          type: number
          nullable: true
          description: Price threshold for alerts
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - author
        - imageUrl

    UserBookDetails:
      allOf:
        - $ref: '#/components/schemas/UserBook'
        - type: object
          properties:
            url:
              type: string
            isbn:
              type: string
              nullable: true
            priceHistory:
              type: array
              items:
                $ref: '#/components/schemas/PriceHistory'

    PriceHistory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid
        price:
          type: number
        currency:
          type: string
        available:
          type: boolean
        scraped_at:
          type: string
          format: date-time
      required:
        - id
        - book_id
        - price
        - currency

    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid
        alert_threshold:
          type: number
          nullable: true
        alert_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - book_id

    CreateAlertRequest:
      type: object
      properties:
        book_id:
          type: string
          format: uuid
        alert_threshold:
          type: number
      required:
        - book_id

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid
        price_at_notification:
          type: number
        sent_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - book_id
        - price_at_notification

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
      required:
        - success
        - error

tags:
  - name: Books
    description: Book tracking and scraping
  - name: Alerts
    description: Price alert management
  - name: Notifications
    description: Notification history
  - name: Authentication
    description: User registration and session management

securitySchemes:
  bearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT
